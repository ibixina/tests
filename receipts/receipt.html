<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Paper Receipt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e5e5e5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas { display: block; }
        .instruction {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <p class="instruction">Grab and drag the receipt</p>

    <script>
    (function() {
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl', { antialias: true, alpha: false });

        if (!gl) { alert('WebGL not supported'); return; }

        const width = 600, height = 700;
        canvas.width = width;
        canvas.height = height;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        gl.viewport(0, 0, width, height);

        // Receipt texture
        const tc = document.createElement('canvas');
        tc.width = 512; tc.height = 900;
        const ctx = tc.getContext('2d');

        ctx.fillStyle = '#f5f5f0';
        ctx.fillRect(0, 0, 512, 900);

        ctx.fillStyle = '#222';
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('THE FLORNRM SHOP', 256, 80);

        ctx.font = '16px monospace';
        ctx.fillText('42 Mesh Lane, WebGL City', 256, 120);
        ctx.fillText('Tel: (555) 042-1337', 256, 145);

        ctx.fillStyle = '#666';
        ctx.fillRect(40, 175, 432, 2);

        ctx.fillStyle = '#222';
        ctx.font = '15px monospace';
        ctx.fillText('Date: 2026-02-23  14:17', 40, 215);
        ctx.fillText('Order: #00382', 40, 240);

        ctx.strokeStyle = '#888';
        ctx.setLineDash([8, 6]);
        ctx.beginPath(); ctx.moveTo(40, 270); ctx.lineTo(472, 270); ctx.stroke();

        const items = [
            { name: 'Vertex Shader', price: '$4.20' },
            { name: 'Fragment Shader', price: '$3.50' },
            { name: 'Normal Map', price: '$2.80' },
            { name: 'UV Unwrap', price: '$1.50' },
            { name: 'Cloth Simulation', price: '$6.00' }
        ];

        let y = 310;
        items.forEach(item => {
            ctx.textAlign = 'left';
            ctx.fillText(item.name, 40, y);
            ctx.textAlign = 'right';
            ctx.fillText(item.price, 472, y);
            y += 28;
        });

        ctx.strokeStyle = '#888';
        ctx.setLineDash([8, 6]);
        ctx.beginPath(); ctx.moveTo(40, y + 10); ctx.lineTo(472, y + 10); ctx.stroke();

        y += 50;
        ctx.textAlign = 'left';
        ctx.fillText('Subtotal', 40, y);
        ctx.textAlign = 'right';
        ctx.fillText('$18.00', 472, y);

        y += 25;
        ctx.fillText('Tax (8%)', 40, y);
        ctx.textAlign = 'right';
        ctx.fillText('$1.44', 472, y);

        ctx.strokeStyle = '#333';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(40, y + 20); ctx.lineTo(472, y + 20); ctx.stroke();
        ctx.lineWidth = 1;

        y += 60;
        ctx.font = 'bold 17px monospace';
        ctx.fillText('TOTAL', 40, y);
        ctx.textAlign = 'right';
        ctx.fillText('$19.44', 472, y);

        ctx.font = '14px monospace';
        ctx.fillStyle = '#444';
        ctx.textAlign = 'center';
        ctx.fillText('Thank you for visiting!', 256, 820);

        ctx.font = '12px monospace';
        ctx.fillStyle = '#888';
        ctx.fillText('http://github.com/flornkm', 256, 850);

        // Create texture
        const texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, tc);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

        // Shaders
        const vs = `
            attribute vec3 aPos;
            attribute vec3 aNorm;
            attribute vec2 aTex;
            uniform mat4 uMVP;
            uniform mat4 uModel;
            uniform mat3 uNormMat;
            varying vec3 vNorm;
            varying vec2 vTex;
            void main() {
                vNorm = uNormMat * aNorm;
                vTex = aTex;
                gl_Position = uMVP * vec4(aPos, 1.0);
            }
        `;

        const fs = `
            precision mediump float;
            varying vec3 vNorm;
            varying vec2 vTex;
            uniform sampler2D uTex;
            void main() {
                vec3 n = normalize(vNorm);
                vec3 l = normalize(vec3(0.5, 0.8, 1.0));
                float a = 0.35;
                float d = max(dot(n, l), 0.0) * 0.55;
                vec3 col = texture2D(uTex, vTex).rgb;
                float g = fract(sin(dot(vTex * 80.0, vec2(12.9898, 78.233))) * 43758.5453);
                col += (g - 0.5) * 0.03;
                col *= (a + d);
                gl_FragColor = vec4(col, 1.0);
            }
        `;

        function createShader(type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
            return s;
        }

        function createProgram(vsSrc, fsSrc) {
            const p = gl.createProgram();
            gl.attachShader(p, createShader(gl.VERTEX_SHADER, vsSrc));
            gl.attachShader(p, createShader(gl.FRAGMENT_SHADER, fsSrc));
            gl.linkProgram(p);
            return p;
        }

        const prog = createProgram(vs, fs);
        const aPos = gl.getAttribLocation(prog, 'aPos');
        const aNorm = gl.getAttribLocation(prog, 'aNorm');
        const aTex = gl.getAttribLocation(prog, 'aTex');
        const uMVP = gl.getUniformLocation(prog, 'uMVP');
        const uModel = gl.getUniformLocation(prog, 'uModel');
        const uNormMat = gl.getUniformLocation(prog, 'uNormMat');
        const uTex = gl.getUniformLocation(prog, 'uTex');

        // Cloth
        const COLS = 25, ROWS = 50;
        const DX = 3.0 / (COLS - 1), DY = 6.0 / (ROWS - 1);

        const particles = [];
        const constraints = [];

        for (let j = 0; j < ROWS; j++) {
            for (let i = 0; i < COLS; i++) {
                const x = (i / (COLS - 1) - 0.5) * 3.0;
                const y = (0.5 - j / (ROWS - 1)) * 6.0;
                particles.push({ x, y, z: 0, ox: x, oy: y, oz: 0, pinned: j === 0 });
            }
        }

        function addC(i1, i2, dist) {
            constraints.push({ a: i1, b: i2, len: dist });
        }

        for (let j = 0; j < ROWS; j++) {
            for (let i = 0; i < COLS; i++) {
                const k = j * COLS + i;
                if (i < COLS - 1) addC(k, k + 1, DX);
                if (j < ROWS - 1) addC(k, k + COLS, DY);
                if (i < COLS - 1 && j < ROWS - 1) {
                    addC(k, k + COLS + 1, Math.sqrt(DX*DX + DY*DY));
                    addC(k + 1, k + COLS, Math.sqrt(DX*DX + DY*DY));
                }
                if (i < COLS - 2) addC(k, k + 2, DX * 2);
                if (j < ROWS - 2) addC(k, k + COLS * 2, DY * 2);
            }
        }

        const posArr = new Float32Array(COLS * ROWS * 3);
        const normArr = new Float32Array(COLS * ROWS * 3);
        const texArr = new Float32Array(COLS * ROWS * 2);
        const idxArr = [];

        for (let j = 0; j < ROWS; j++) {
            for (let i = 0; i < COLS; i++) {
                const k = j * COLS + i;
                texArr[k * 2] = i / (COLS - 1);
                texArr[k * 2 + 1] = 1.0 - j / (ROWS - 1);
            }
        }

        for (let j = 0; j < ROWS - 1; j++) {
            for (let i = 0; i < COLS - 1; i++) {
                const k = j * COLS + i;
                idxArr.push(k, k + 1, k + COLS, k + 1, k + COLS + 1, k + COLS);
            }
        }

        const posBuf = gl.createBuffer();
        const normBuf = gl.createBuffer();
        const texBuf = gl.createBuffer();
        const idxBuf = gl.createBuffer();

        gl.bindBuffer(gl.ARRAY_BUFFER, texBuf);
        gl.bufferData(gl.ARRAY_BUFFER, texArr, gl.STATIC_DRAW);
        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
        gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(idxArr), gl.STATIC_DRAW);

        // Original physics settings
        const GRAV = -9.8;
        const DAMP = 0.98;
        const ITERS = 12;

        let grabbed = null;

        function updatePhysics(dt) {
            for (const p of particles) {
                if (p.pinned) continue;
                const vx = (p.x - p.ox) * DAMP;
                const vy = (p.y - p.oy) * DAMP;
                const vz = (p.z - p.oz) * DAMP;
                p.ox = p.x; p.oy = p.y; p.oz = p.z;
                p.x += vx; p.y += vy + GRAV * dt * dt; p.z += vz;
            }

            if (grabbed) {
                grabbed.x = grabbed.targetX;
                grabbed.y = grabbed.targetY;
                grabbed.z = grabbed.targetZ;
                grabbed.ox = grabbed.targetX;
                grabbed.oy = grabbed.targetY;
                grabbed.oz = grabbed.targetZ;
            }

            for (let it = 0; it < ITERS; it++) {
                for (const c of constraints) {
                    const p1 = particles[c.a], p2 = particles[c.b];
                    const dx = p2.x - p1.x, dy = p2.y - p1.y, dz = p2.z - p1.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.0001;
                    const diff = (dist - c.len) / dist * 0.5;
                    const mx = dx * diff, my = dy * diff, mz = dz * diff;
                    if (!p1.pinned) { p1.x += mx; p1.y += my; p1.z += mz; }
                    if (!p2.pinned) { p2.x -= mx; p2.y -= my; p2.z -= mz; }
                }
            }
        }

        function updateMesh() {
            for (let i = 0; i < particles.length; i++) {
                posArr[i*3] = particles[i].x;
                posArr[i*3+1] = particles[i].y;
                posArr[i*3+2] = particles[i].z;
            }

            normArr.fill(0);
            for (let j = 0; j < ROWS - 1; j++) {
                for (let i = 0; i < COLS - 1; i++) {
                    const k = j * COLS + i;
                    const p0 = particles[k], p1 = particles[k+1], p2 = particles[k+COLS];
                    const ax = p1.x-p0.x, ay = p1.y-p0.y, az = p1.z-p0.z;
                    const bx = p2.x-p0.x, by = p2.y-p0.y, bz = p2.z-p0.z;
                    const nx = ay*bz - az*by, ny = az*bx - ax*bz, nz = ax*by - ay*bx;
                    for (const pk of [k, k+1, k+COLS, k+COLS+1]) {
                        normArr[pk*3] += nx; normArr[pk*3+1] += ny; normArr[pk*3+2] += nz;
                    }
                }
            }

            for (let i = 0; i < particles.length; i++) {
                const nn = Math.sqrt(normArr[i*3]**2 + normArr[i*3+1]**2 + normArr[i*3+2]**2) || 1;
                normArr[i*3] /= nn; normArr[i*3+1] /= nn; normArr[i*3+2] /= nn;
            }

            gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
            gl.bufferData(gl.ARRAY_BUFFER, posArr, gl.DYNAMIC_DRAW);
            gl.bindBuffer(gl.ARRAY_BUFFER, normBuf);
            gl.bufferData(gl.ARRAY_BUFFER, normArr, gl.DYNAMIC_DRAW);
        }

        // Matrices
        function persp(fov, asp, n, f) {
            const t = 1 / Math.tan(fov / 2);
            return new Float32Array([t/asp,0,0,0, 0,t,0,0, 0,0,(f+n)/(n-f),-1, 0,0,2*f*n/(n-f),0]);
        }

        function lookAt(eye, target, up) {
            const z = [eye[0]-target[0], eye[1]-target[1], eye[2]-target[2]];
            let l = Math.sqrt(z[0]*z[0]+z[1]*z[1]+z[2]*z[2]); z[0]/=l; z[1]/=l; z[2]/=l;
            const x = [up[1]*z[2]-up[2]*z[1], up[2]*z[0]-up[0]*z[2], up[0]*z[1]-up[1]*z[0]];
            l = Math.sqrt(x[0]*x[0]+x[1]*x[1]+x[2]*x[2]); x[0]/=l; x[1]/=l; x[2]/=l;
            const y = [z[1]*x[2]-z[2]*x[1], z[2]*x[0]-z[0]*x[2], z[0]*x[1]-z[1]*x[0]];
            return new Float32Array([x[0],y[0],z[0],0, x[1],y[1],z[1],0, x[2],y[2],z[2],0,
                -(x[0]*eye[0]+x[1]*eye[1]+x[2]*eye[2]), -(y[0]*eye[0]+y[1]*eye[1]+y[2]*eye[2]), -(z[0]*eye[0]+z[1]*eye[1]+z[2]*eye[2]), 1]);
        }

        function mul(a, b) {
            const r = new Float32Array(16);
            for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) {
                r[j*4+i] = a[i]*b[j*4] + a[i+4]*b[j*4+1] + a[i+8]*b[j*4+2] + a[i+12]*b[j*4+3];
            }
            return r;
        }

        const proj = persp(Math.PI / 4, width / height, 0.1, 100);
        const view = lookAt([0, 0, 8], [0, -1.5, 0], [0, 1, 0]);
        const mvp = mul(proj, view);
        
        function getNormMat(m) {
            return new Float32Array([m[0],m[1],m[2], m[4],m[5],m[6], m[8],m[9],m[10]]);
        }

        function render() {
            gl.clearColor(0.898, 0.898, 0.898, 1);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            gl.enable(gl.DEPTH_TEST);

            gl.useProgram(prog);
            gl.uniformMatrix4fv(uMVP, false, mvp);
            gl.uniformMatrix4fv(uModel, false, view);
            gl.uniformMatrix3fv(uNormMat, false, getNormMat(view));

            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.uniform1i(uTex, 0);

            gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
            gl.enableVertexAttribArray(aPos);
            gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

            gl.bindBuffer(gl.ARRAY_BUFFER, normBuf);
            gl.enableVertexAttribArray(aNorm);
            gl.vertexAttribPointer(aNorm, 3, gl.FLOAT, false, 0, 0);

            gl.bindBuffer(gl.ARRAY_BUFFER, texBuf);
            gl.enableVertexAttribArray(aTex);
            gl.vertexAttribPointer(aTex, 2, gl.FLOAT, false, 0, 0);

            gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
            gl.disable(gl.CULL_FACE);
            gl.drawElements(gl.TRIANGLES, idxArr.length, gl.UNSIGNED_SHORT, 0);
        }

        // Original grabbing code
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            return { x: (e.clientX||e.touches[0].clientX) - r.left, y: (e.clientY||e.touches[0].clientY) - r.top };
        }

        function toWorld(mx, my) {
            const ndcX = (mx / width) * 2 - 1;
            const ndcY = 1 - (my / height) * 2;
            const fov = Math.PI / 4;
            const tanF = Math.tan(fov / 2);
            const aspect = width / height;
            const camZ = 8;
            const worldX = ndcX * tanF * aspect * camZ;
            const worldY = -ndcY * tanF * camZ - 1.5;
            return { x: worldX, y: worldY, z: 0 };
        }

        function findClosest(mx, my) {
            const world = toWorld(mx, my);
            let best = null, bestD = Infinity;
            for (const p of particles) {
                const dx = p.x - world.x, dy = p.y - world.y, dz = p.z - world.z;
                const d = dx*dx + dy*dy + dz*dz;
                if (d < bestD) { bestD = d; best = p; }
            }
            return bestD < 2.0 ? best : null;
        }

        canvas.addEventListener('mousedown', e => {
            const p = getPos(e);
            const part = findClosest(p.x, p.y);
            if (part && !part.pinned) {
                grabbed = part;
                grabbed.targetX = part.x;
                grabbed.targetY = part.y;
                grabbed.targetZ = part.z;
            }
        });

        canvas.addEventListener('mousemove', e => {
            if (!grabbed) return;
            const p = getPos(e);
            const world = toWorld(p.x, p.y);
            grabbed.targetX = world.x;
            grabbed.targetY = world.y;
            grabbed.targetZ = world.z + 2;
        });

        canvas.addEventListener('mouseup', () => { grabbed = null; });
        canvas.addEventListener('mouseleave', () => { grabbed = null; });

        // Touch
        canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown', {clientX: t.clientX, clientY: t.clientY})); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', {clientX: t.clientX, clientY: t.clientY})); }, {passive:false});
        canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); }, {passive:false});

        // Loop
        let last = performance.now();
        function loop(t) {
            updatePhysics(Math.min((t - last) / 1000, 0.02));
            last = t;
            updateMesh();
            render();
            requestAnimationFrame(loop);
        }
        updateMesh();
        requestAnimationFrame(loop);
    })();
    </script>
</body>
</html>
